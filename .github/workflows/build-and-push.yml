name: Build and Push Multi-Arch Images

on:
    workflow_dispatch:
        inputs:
            build_php84:
                description: 'Build PHP 8.4'
                type: boolean
                default: true
            build_php85:
                description: 'Build PHP 8.5'
                type: boolean
                default: true
            version_tag:
                description: 'Version tag for the images (e.g., 1.3)'
                required: true
                default: '1.3'
            build_fpm:
                description: 'Build FPM'
                type: boolean
                default: true
            build_fpm_claude:
                description: 'Build FPM Claude'
                type: boolean
                default: true
            build_frankenphp:
                description: 'Build FrankenPHP'
                type: boolean
                default: true
            build_roadrunner:
                description: 'Build RoadRunner'
                type: boolean
                default: true
            build_openswoole:
                description: 'Build OpenSwoole'
                type: boolean
                default: true

permissions:
    packages: write
    contents: read

jobs:
    setup:
        name: Setup Build Matrix
        runs-on: ubuntu-latest
        outputs:
            php_versions: ${{ steps.set-matrix.outputs.php_versions }}
            variants: ${{ steps.set-matrix.outputs.variants }}
        steps:
            -   name: Set matrix values
                id: set-matrix
                run: |
                    # Build PHP versions array based on inputs
                    php_versions=()

                    if [[ "${{ inputs.build_php84 }}" == "true" ]]; then
                        php_versions+=("8.4")
                    fi

                    if [[ "${{ inputs.build_php85 }}" == "true" ]]; then
                        php_versions+=("8.5")
                    fi

                    if [ ${#php_versions[@]} -eq 0 ]; then
                        echo "❌ Error: No PHP versions selected."
                        exit 1
                    fi

                    PHP_JSON=$(printf '%s\n' "${php_versions[@]}" | jq -R . | jq -s -c .)
                    echo "php_versions=${PHP_JSON}" >> $GITHUB_OUTPUT

                    # Build variants array based on inputs
                    variants=()

                    if [[ "${{ inputs.build_fpm }}" == "true" ]]; then
                        variants+=("fpm")
                    fi

                    if [[ "${{ inputs.build_frankenphp }}" == "true" ]]; then
                        variants+=("frankenphp")
                    fi

                    if [[ "${{ inputs.build_roadrunner }}" == "true" ]]; then
                        variants+=("roadrunner")
                    fi

                    if [[ "${{ inputs.build_openswoole }}" == "true" ]]; then
                        variants+=("openswoole")
                    fi

                    if [[ "${{ inputs.build_fpm_claude }}" == "true" ]]; then
                        variants+=("fpm-claude")
                    fi

                    # Convert bash array to JSON using jq for safety
                    if [ ${#variants[@]} -eq 0 ]; then
                        echo "❌ Error: No variants selected."
                        exit 1
                    fi

                    JSON_OUTPUT=$(printf '%s\n' "${variants[@]}" | jq -R . | jq -s -c .)
                    echo "variants=${JSON_OUTPUT}" >> $GITHUB_OUTPUT

    build-and-push:
        name: Build Multi-Arch Images
        runs-on: ubuntu-latest
        needs: setup
        strategy:
            fail-fast: false
            matrix:
                php_version: ${{ fromJson(needs.setup.outputs.php_versions) }}
                variant: ${{ fromJson(needs.setup.outputs.variants) }}
        steps:
            -   name: Checkout code
                uses: actions/checkout@v4

            -   name: Set up QEMU
                uses: docker/setup-qemu-action@v3
                with:
                    platforms: linux/amd64,linux/arm64

            -   name: Set up Docker Buildx
                uses: docker/setup-buildx-action@v3

            -   name: Log in to GitHub Container Registry
                uses: docker/login-action@v3
                with:
                    registry: ghcr.io
                    username: ${{ github.actor }}
                    password: ${{ secrets.GITHUB_TOKEN }}

            -   name: Extract metadata (tags, labels) for Docker
                id: meta
                uses: docker/metadata-action@v5
                with:
                    images: ghcr.io/jonaaix/laravel-aio
                    tags: |
                        type=raw,value=${{ inputs.version_tag }}-php${{ matrix.php_version }}-${{ matrix.variant }}

            -   name: Build and push multi-arch image
                uses: docker/build-push-action@v5
                with:
                    context: .
                    file: ./src/php-${{ matrix.variant }}/Dockerfile
                    platforms: linux/amd64,linux/arm64
                    build-args: |
                        INPUT_PHP=${{ matrix.php_version }}
                    tags: ${{ steps.meta.outputs.tags }}
                    labels: ${{ steps.meta.outputs.labels }}
                    push: true
                    provenance: false
                    sbom: false
                    # Add explicit scope to isolate caches per variant
                    cache-from: type=gha,scope=php${{ matrix.php_version }}-${{ matrix.variant }}
                    cache-to: type=gha,mode=max,scope=php${{ matrix.php_version }}-${{ matrix.variant }}
